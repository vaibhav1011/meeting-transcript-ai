services:
  mongo:
    image: mongo:7
    container_name: meeting-assistant-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: meeting-assistant-ml-service
    restart: unless-stopped
    environment:
      HF_TOKEN: ${HF_TOKEN}
      WHISPERX_MODEL: large-v3
      WHISPERX_BATCH_SIZE: 8
    ports:
      - "8000:8000"

  bot-service:
    build:
      context: ./bot-service
      dockerfile: Dockerfile
    container_name: meeting-assistant-bot-service
    restart: unless-stopped
    env_file:
      - ./bot-service/.env
    environment:
      BACKEND_BASE_URL: http://backend:8080
    ports:
      - "8090:8090"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meeting-assistant-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      BOT_SERVICE_URL: http://bot-service:8090
      ML_SERVICE_URL: http://ml-service:8000
    ports:
      - "8080:8080"
    depends_on:
      - mongo
      - ml-service
      - bot-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: meeting-assistant-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
